<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weather Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  html, body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: linear-gradient(160deg, #1a2530 0%, #0f1c14 50%, #1a2a1e 100%);
  }

  /* Full-screen storm background — no blur, fully visible */
  .storm-bg {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
  }

  /* Standard glass card — clear transparent with just a subtle tint */
  .glass {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px) saturate(120%);
    -webkit-backdrop-filter: blur(12px) saturate(120%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 1rem;
  }

  /* Right panel container — fully transparent, no blur backdrop,
     individual cards inside are what carry the frost. */
  .glass-dark {
    background: transparent;
    border: none;
    border-radius: 0;
  }

  /* Sidebar — floating rounded pill, transparent so storm shows through */
  .glass-sidebar {
    background: rgba(15, 20, 25, 0.38);
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 28px;
  }

  .sidebar-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .sidebar-icon.active,
  .sidebar-icon:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .dash-bg {
    background: rgba(30,35,40,0.55);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons/index.jsx"></script>
  <script type="text/babel" src="src/components/Sidebar.jsx"></script>
  <script type="text/babel" src="src/components/TopBar.jsx"></script>
  <script type="text/babel" src="src/components/MainPanel.jsx"></script>
  <script type="text/babel" src="src/components/RightPanel.jsx"></script>
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
